# Model Registry — Triage-Medley
# adapter: "mock" | "huggingface" | "space"
#   mock        — local JSON responses (Sprint 1 development)
#   huggingface — HF Inference API via InferenceClient
#   space       — HF Space via gradio_client (requires space_id)

models:
  medgemma_4b:
    name: "MedGemma 4B"
    hf_id: "google/medgemma-4b-it"
    adapter: "space"
    space_id: "${HF_SPACE_ID}"
    api_name: "/doctor_infer"
    stages: ["pretriage", "triage", "differential", "management"]
    priority: "P1"
    role: "Anchor model — fast, multimodal, runs in both stages"
    timeout_seconds: 180

  meditron_7b:
    name: "Meditron3 7B"
    hf_id: "OpenMeditron/Meditron3-Qwen2.5-7B"
    adapter: "space"
    space_id: "${HF_SPACE_ID}"
    api_name: "/doctor_infer"
    stages: ["triage", "differential"]
    priority: "P2"
    role: "Medical specialized Qwen2.5-7B variant"
    timeout_seconds: 180

  biomistral:
    name: "BioMistral"
    hf_id: "BioMistral/BioMistral-7B"
    adapter: "space"
    space_id: "${HF_SPACE_ID}"
    api_name: "/doctor_infer"
    stages: ["triage", "differential"]
    priority: "P3"
    role: "Devil's advocate / don't-miss flagging"
    timeout_seconds: 180
    enabled: false

  claude_opus_4_5:
    name: "Claude Opus 4.5"
    hf_id: "anthropic/claude-opus-4-5"
    adapter: "mock"
    stages: ["triage", "differential", "management"]
    priority: "P1"
    role: "Deep analysis, Stage B only — mock responses generated by Claude Opus 4.5"
    timeout_seconds: 15

  retts_rules_engine:
    name: "RETTS Rules Engine"
    adapter: "deterministic"
    stages: ["triage"]
    priority: null
    role: "Pure rule-based vitals → RETTS colour"

  esi_rules_engine:
    name: "ESI Rules Engine"
    adapter: "deterministic"
    stages: ["triage"]
    priority: null
    role: "ESI 5-level decision tree — acuity + resource-based"

  mts_rules_engine:
    name: "MTS Rules Engine"
    adapter: "deterministic"
    stages: ["triage"]
    priority: null
    role: "Manchester Triage System — discriminator flowcharts"

speech:
  medasr:
    name: "MedASR"
    hf_id: "google/medasr"
    adapter: "mock"

  whisper_large_v3:
    name: "Whisper Large v3"
    hf_id: "openai/whisper-large-v3"
    adapter: "mock"

  translate_gemma:
    name: "TranslateGemma 4B"
    hf_id: "google/translate-gemma-4b"
    adapter: "mock"
